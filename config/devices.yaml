# Device Configuration
# Multi-Robot Control System
#
# Ez a fájl tartalmazza az eszközök listáját és csatlakozási adatait.
# A driver-specifikus beállítások (axis_limits, closed_loop, startup_position)
# a config/machines/{deviceId}.json fájlokból jönnek.
#
# =====================================================
# USB ESZKÖZAZONOSÍTÁS
# =====================================================
# Az eszközök azonosíthatók USB attribútumok alapján a változó /dev/ttyUSB* 
# portoktól függetlenül. Használd a GET /usb/devices endpointot az elérhető
# eszközök és azonosítóik lekérdezéséhez.
#
# Prioritási sorrend:
#   1. usb.serial_number - Egyedi sorozatszám (ha az eszköz támogatja)
#   2. usb.vid + usb.pid + usb.location - VID:PID + USB port pozíció
#   3. usb.vid + usb.pid - Vendor/Product ID (első találat)
#   4. port - Statikus port útvonal (fallback)
#
# Példa USB azonosítással:
#   config:
#     usb:
#       serial_number: "A50285BI"        # FTDI és minőségi adapterek
#     # VAGY
#       vid: "1a86"                      # Vendor ID (hex)
#       pid: "7523"                      # Product ID (hex)
#       location: "3-3"                  # USB port pozíció (opcionális)
#     port: /dev/ttyUSB0                 # Fallback ha USB nem található
#     baudrate: 115200

devices:
  # =====================================================
  # CNC Maró - JP-3163B + TB6560 + LinuxCNC
  # =====================================================
  - id: cnc_main
    name: "CNC Maró"
    driver: linuxcnc
    type: cnc_mill
    enabled: false
    simulated: true
    config:
      ini_file: /home/user/linuxcnc/configs/jp3163b/jp3163b.ini
      
  # =====================================================
  # Lézervágó - EleksMana W5.2 + GRBL
  # =====================================================
  - id: laser_1
    name: "Lézervágó"
    driver: grbl
    type: laser_cutter
    enabled: false
    simulated: false
    config:
      port: /dev/ttyUSB0
      baudrate: 115200
      
  # =====================================================
  # Robotkar v1 - Open Loop (régi board, 3 tengelyes)
  # =====================================================
  - id: robot_arm_1
    name: "Robotkar v1 (Open Loop)"
    driver: robot_arm
    type: robot_arm
    enabled: false
    simulated: false
    config:
      usb:
        vid: "1a86"
        pid: "7523"
        location: "3-4"
      port: /dev/ttyUSB1
      baudrate: 115200

  # =====================================================
  # Robotkar v2 - Closed Loop (ESP32 GRBL 6-Axis board)
  # =====================================================
  - id: robot_arm_2
    name: "Robotkar v2 (Closed Loop)"
    driver: robot_arm
    type: robot_arm
    enabled: false
    simulated: false
    config:
      usb:
        vid: "1a86"
        pid: "7523"
        location: "3-3"
      port: /dev/ttyUSB0
      baudrate: 115200

  # =====================================================
  # Csőhajlító - grblHAL (ESP32-S3)
  # =====================================================
  - id: tube_bender_1
    name: "Csőhajlító"
    driver: tube_bender
    type: tube_bender
    enabled: true
    simulated: false
    config:
      protocol: grbl
      usb:
        vid: "1a86"
        pid: "55d3"
        serial_number: "5B8E071772"
      port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5B8E071772-if00
      baudrate: 115200
