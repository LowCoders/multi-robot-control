# Device Configuration
# Multi-Robot Control System
#
# Ez a fájl tartalmazza az összes eszköz konfigurációját.
# A bridge szerver indításkor beolvassa és inicializálja az eszközöket.

devices:
  # =====================================================
  # CNC Maró - JP-3163B + TB6560 + LinuxCNC
  # =====================================================
  - id: cnc_main
    name: "CNC Maró"
    driver: linuxcnc
    type: cnc_mill
    enabled: true
    simulated: true  # Szimulált eszköz (LinuxCNC nincs csatlakoztatva)
    config:
      # LinuxCNC INI fájl útvonala
      ini_file: /home/user/linuxcnc/configs/jp3163b/jp3163b.ini
      
  # =====================================================
  # Lézervágó - EleksMana W5.2 + GRBL
  # =====================================================
  - id: laser_1
    name: "Lézervágó"
    driver: grbl
    type: laser_cutter
    enabled: true
    simulated: false  # Nincs csatlakoztatva – ha csatlakozik, átállítandó false-ra
    config:
      # Soros port
      port: /dev/ttyUSB1
      # Baud rate (GRBL default: 115200)
      baudrate: 115200
      # Maximális előtolási sebesség (mm/min)
      max_feed_rate: 20000
      
  # =====================================================
  # Ipari Robotkar - 3 tengelyes + GRBL firmware
  # =====================================================
  - id: robot_arm_1
    name: "Ipari Robotkar"
    driver: robot_arm
    type: robot_arm
    enabled: true
    simulated: false
    config:
      # Soros port (CH340 USB-serial adapter)
      port: /dev/ttyUSB0
      # Baud rate (GRBL default: 115200)
      baudrate: 115200
      
      # Robot kinematikai méretek (mm) - az IK/FK számításokhoz
      # Forrás: test_robot.py kalibrált értékek
      robot_config:
        L1: 85    # Bázis magasság (mm)
        L2: 140   # Felkar hossz (mm)
        L3: 165   # Alkar hossz (mm)
      
      # Joint-GRBL tengely mapping (fix, firmware bekötés alapján):
      #   J1 (bázis)  -> GRBL Z tengely
      #   J2 (váll)   -> GRBL X tengely
      #   J3 (könyök) -> GRBL Y tengely
      # A GRBL firmware közvetlenül fokban dolgozik (1:1 mapping)
      
      # Szoftveres tengelylimitek (fokban)
      # Forrás: test_robot.py SAFE_LIMITS (végállásoktól 5° távolság)
      # X = J2 (váll), Y = J3 (könyök), Z = J1 (bázis) a GRBL mapping miatt
      axis_limits:
        X: [-5, 91]       # J2 váll (fok) - GRBL X tengely
        Y: [-50, 35]      # J3 könyök (fok) - GRBL Y tengely
        Z: [-175, 175]    # J1 bázis forgás (fok) - GRBL Z tengely
      
      # Maximális mozgási sebesség (1-200 skála)
      max_feed_rate: 2000

  # =====================================================
  # Példa: 3D Nyomtató (jövőbeli bővítés)
